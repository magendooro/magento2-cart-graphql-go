---
when:
  - event: [push, pull_request]

steps:
  - name: clone-go-common
    image: /bin/sh
    commands:
      - git clone http://localhost:3000/magendoo/magento2-go-common.git ./go-common

  - name: setup-go-workspace
    image: /bin/sh
    commands:
      - |
        cat > ./go.work <<'EOF'
        go 1.25
        use (
          .
          ./go-common
        )
        EOF

  - name: build
    image: /bin/sh
    commands:
      - GOTOOLCHAIN=auto go build ./...

  - name: vet
    image: /bin/sh
    commands:
      - GOTOOLCHAIN=auto go vet ./...

  - name: test
    image: /bin/sh
    commands:
      - GOTOOLCHAIN=auto go test ./tests/ -run "^Test[^C]" -v -timeout 60s -count=1

  - name: cross-compile
    image: /bin/sh
    commands:
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 GOTOOLCHAIN=auto go build -buildvcs=false -o cart-server-new ./cmd/server/
    when:
      - event: push
        branch: [main, master]

  - name: deploy
    image: /bin/sh
    commands:
      - scp cart-server-new deploy:/tmp/cart-server
      - ssh deploy "
          set -e
          BINS=/srv/magendoo/bins
          [ -f \$BINS/cart ] && cp \$BINS/cart \$BINS/cart.bak
          cp /tmp/cart-server \$BINS/cart.new
          chmod +x \$BINS/cart.new
          mv \$BINS/cart.new \$BINS/cart
          systemctl restart magendoo-cart
          sleep 3
          systemctl is-active magendoo-cart && echo 'deploy ok' || (echo 'FAILED — rolling back'; cp \$BINS/cart.bak \$BINS/cart; systemctl restart magendoo-cart; exit 1)
        "
    when:
      - event: push
        branch: [main, master]
